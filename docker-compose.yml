services:
  checkbarcode:
    build:
      context: .
      dockerfile: Dockerfile
    image: checkbarcode:latest
    container_name: checkbarcode
    restart: unless-stopped
    # Bind to localhost only — Nginx on the host will proxy to it.
    # Other websites on the same server keep their own ports untouched.
    ports:
      - "127.0.0.1:3003:3000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
